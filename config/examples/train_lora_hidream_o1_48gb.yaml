# HiDream-O1 LoRA training. O1 is a pixel-space transformer, so do not use a VAE,
# SD-style latent standardization, or text-encoder training here. The defaults below
# are intentionally calmer than old HiDream-I1 LoRA recipes, because apparently loss
# curves prefer not being launched into orbit.

---
job: extension
config:
  name: "my_hidream_o1_lora"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
#      trigger_word: "p3r5on"
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        network_kwargs:
          # Keep the language head, patch input, and visual tower out of the LoRA.
          # The useful training signal is in the transformer layers.
          ignore_if_contains:
            - "lm_head"
            - "patch_embed"
            - "visual"
        transformer_only: false
      save:
        dtype: bfloat16
        save_every: 500
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/path/to/images/folder"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          # O1 is patch-aligned at 32 px. These resolutions stay divisible by 32.
          resolution: [1024, 1536, 2048]
      train:
        noise_scheduler: "flowmatch"
        timestep_type: "sigmoid"
        content_or_style: "balanced"
        loss_type: "mse"
        # O1 emits an x0 prediction. This trains the implied t->0 image target,
        # which is much less jumpy than raw velocity loss at tiny sigmas.
        t0_loss_target: true
        max_loss: 1.0
        max_grad_norm: 1.0
        batch_size: 2
        gradient_accumulation: 1
        steps: 8000
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        optimizer: "adamw8bit"
        optimizer_params:
          weight_decay: 0.0001
        lr: 3e-5
        dtype: bf16
        standardize_images: false
        standardize_latents: false
        latent_multiplier: 1.0
#        skip_first_sample: true
#        disable_sampling: true
      logging:
        log_every: 10
        monitor_every: 1
        monitor_tensor_stats: true
        monitor_gpu_stats: true
        monitor_grad_stats: true
      model:
        name_or_path: "HiDream-ai/HiDream-O1-Image"
        extras_name_or_path: "HiDream-ai/HiDream-O1-Image"
        arch: "hidream_o1"
        quantize: true
        quantize_te: false
        model_kwargs:
          noise_scale: 8.0
          noise_scale_inference: 8.0
      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 1024
        height: 1024
        prompts:
          - "[trigger] portrait photo, natural light, sharp eyes, clean background"
          - "[trigger] full body photo, outdoor street scene, realistic lighting"
          - "[trigger] cinematic close up, shallow depth of field"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 4
        sample_steps: 50
meta:
  name: "[name]"
  version: '1.0'
